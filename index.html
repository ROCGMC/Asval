<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關係指南針 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { @apply bg-white p-5 rounded-2xl shadow-sm mb-4 border border-gray-100; }
        select, input { @apply border border-gray-200 p-2 rounded-lg bg-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm; }
        label { @apply text-xs font-bold text-gray-500 mb-1 block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10 text-slate-800">

    <nav class="bg-indigo-600 text-white p-4 sticky top-0 z-20 shadow-md">
        <h1 class="text-lg font-black text-center tracking-widest">RELATIONSHIP COMPASS</h1>
    </nav>

    <main class="max-w-md mx-auto p-4">
        
        <section class="card border-t-4 border-orange-400">
            <h2 class="font-bold mb-3 text-orange-600 flex items-center gap-2">
                👤 我的基本設定
            </h2>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label>我的 MBTI</label>
                    <select id="myMbti" class="w-full" onchange="saveMe()"></select>
                </div>
                <div>
                    <label>我的生日</label>
                    <div class="flex gap-1">
                        <select id="myM" class="w-full" onchange="saveMe()"></select>
                        <select id="myD" class="w-full" onchange="saveMe()"></select>
                    </div>
                </div>
            </div>
            <p class="text-[10px] text-gray-400 mt-2">* 設定後，系統將依此提供客製化相處建議</p>
        </section>

        <hr class="my-6 border-gray-200">

        <section class="card">
            <h2 class="font-bold mb-4 flex items-center gap-2 text-indigo-600">
                ➕ 新增聯絡人
            </h2>
            <div class="space-y-4">
                <input id="name" type="text" placeholder="聯絡人姓名" class="w-full">
                <div class="grid grid-cols-2 gap-2">
                    <select id="mbti" class="w-full"></select>
                    <div class="flex gap-1">
                        <select id="year" class="w-1/2" onchange="updateDays('year','month','day')"></select>
                        <select id="month" class="w-1/4" onchange="updateDays('year','month','day')"></select>
                        <select id="day" class="w-1/4"></select>
                    </div>
                </div>
                <button onclick="saveContact()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-lg active:scale-95 transition-all">
                    分析相處密碼
                </button>
            </div>
        </section>

        <div id="contactList"></div>
    </main>

    <script>
        // --- 初始化選單數據 ---
        const mbtiList = ["INTJ","INTP","ENTJ","ENTP","INFJ","INFP","ENFJ","ENFP","ISTJ","ISFJ","ESTJ","ESFJ","ISTP","ISFP","ESTP","ESFP"];
        
        function initSelectors() {
            const mbtiSelectors = [document.getElementById('myMbti'), document.getElementById('mbti')];
            mbtiSelectors.forEach(s => {
                s.innerHTML = '<option value="">MBTI</option>';
                mbtiList.forEach(m => s.options.add(new Option(m, m)));
            });

            const currentYear = new Date().getFullYear();
            const ySel = document.getElementById('year');
            for(let i = currentYear; i >= 1950; i--) ySel.options.add(new Option(i, i));

            const mSels = [document.getElementById('myM'), document.getElementById('month')];
            mSels.forEach(s => {
                s.innerHTML = '';
                for(let i = 1; i <= 12; i++) s.options.add(new Option(i + "月", i));
            });
            
            updateDays('year', 'month', 'day');
            updateDays(null, 'myM', 'myD'); // 個人生日不強制年份
            loadMe();
        }

        function updateDays(yId, mId, dId) {
            const y = yId ? document.getElementById(yId).value : 2000;
            const m = document.getElementById(mId).value;
            const dSel = document.getElementById(dId);
            const days = new Date(y, m, 0).getDate();
            dSel.innerHTML = "";
            for(let i = 1; i <= days; i++) dSel.options.add(new Option(i + "日", i));
        }

        // --- 核心邏輯：個人資訊 ---
        function saveMe() {
            const me = {
                mbti: document.getElementById('myMbti').value,
                m: document.getElementById('myM').value,
                d: document.getElementById('myD').value
            };
            localStorage.setItem('me', JSON.stringify(me));
            render(); // 重新渲染列表以更新對比建議
        }

        function loadMe() {
            const me = JSON.parse(localStorage.getItem('me') || '{}');
            if(me.mbti) document.getElementById('myMbti').value = me.mbti;
            if(me.m) document.getElementById('myM').value = me.m;
            updateDays(null, 'myM', 'myD');
            if(me.d) document.getElementById('myD').value = me.d;
        }

        // --- 核心邏輯：計算建議 ---
        const getLifeNum = (y, m, d) => {
            let sum = `${y}${m}${d}`.split('').reduce((a, b) => a + parseInt(b), 0);
            while (sum > 9 && sum !== 11 && sum !== 22) sum = sum.toString().split('').reduce((a,b)=>a+parseInt(b),0);
            return sum;
        };

        function generateAdvice(me, target) {
            if(!me.mbti) return "⚠️ 請先在上方設定『我的資訊』以獲得對比建議。";
            
            let tips = [];
            // MBTI 對比
            const meT = me.mbti.includes('T'), targetT = target.mbti.includes('T');
            const meE = me.mbti.includes('E'), targetE = target.mbti.includes('E');

            if (meT && !targetT) tips.push("💡 對方較感性，交流時請先表達關心，避免直接指出錯誤。");
            if (!meT && targetT) tips.push("⚖️ 對方重視邏輯，建議對話時精簡事實，收斂情緒化表達。");
            if (meE && !targetE) tips.push("🔇 你較外向，請留給對方更多思考與反應的留白時間。");

            // 星座/靈數對比 (範例：數值差距)
            const diff = Math.abs(getLifeNum(2000, me.m, me.d) - target.lifeNum);
            if (diff === 0) tips.push("✨ 你們生命頻率相近，容易產生共鳴。");
            
            return tips.length > 0 ? tips.join('<br>') : "🌱 保持平常心，用真誠建立連結。";
        }

        // --- 聯絡人管理 ---
        function saveContact() {
            const name = document.getElementById('name').value;
            const mbti = document.getElementById('mbti').value;
            if(!name || !mbti) return alert("請填寫姓名與MBTI");

            const y = document.getElementById('year').value;
            const m = document.getElementById('month').value;
            const d = document.getElementById('day').value;
            
            const contact = {
                id: Date.now(),
                name, mbti,
                bday: `${m}/${d}`,
                lifeNum: getLifeNum(y, m, d)
            };

            let contacts = JSON.parse(localStorage.getItem('contacts') || '[]');
            contacts.unshift(contact);
            localStorage.setItem('contacts', JSON.stringify(contacts));
            render();
        }

        function render() {
            const me = JSON.parse(localStorage.getItem('me') || '{}');
            const list = document.getElementById('contactList');
            const contacts = JSON.parse(localStorage.getItem('contacts') || '[]');
            
            list.innerHTML = contacts.map(c => `
                <div class="card border-l-4 border-indigo-500">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h3 class="font-bold text-lg">${c.name} <span class="text-indigo-500 text-sm">[${c.mbti}]</span></h3>
                            <p class="text-xs text-gray-400">生日：${c.bday} | 生命靈數：${c.lifeNum}</p>
                        </div>
                        <button onclick="deleteContact(${c.id})" class="text-gray-300">✕</button>
                    </div>
                    <div class="bg-indigo-50 p-3 rounded-lg text-sm text-indigo-900 leading-relaxed">
                        ${generateAdvice(me, c)}
                    </div>
                </div>
            `).join('');
        }

        function deleteContact(id) {
            let contacts = JSON.parse(localStorage.getItem('contacts') || '[]');
            localStorage.setItem('contacts', JSON.stringify(contacts.filter(c => c.id !== id)));
            render();
        }

        initSelectors();
    </script>
</body>
</html>
