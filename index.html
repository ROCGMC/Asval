<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關係指南針 Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { @apply bg-white p-5 rounded-2xl shadow-sm mb-4 border border-gray-100; }
        select, input { @apply border border-gray-200 p-2 rounded-lg bg-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm; }
        label { @apply text-xs font-bold text-gray-500 mb-1 block; }
        .tag { @apply text-[10px] px-2 py-0.5 rounded-md font-bold mr-1; }
        .analysis-item { @apply mb-2 pb-2 border-b border-white/50 last:border-0; }
        .status-green { @apply border-l-8 border-green-500 bg-green-50; }
        .status-yellow { @apply border-l-8 border-yellow-500 bg-yellow-50; }
        .status-red { @apply border-l-8 border-red-500 bg-red-50; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-10 text-slate-800">

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-20 shadow-lg">
        <h1 class="text-lg font-black text-center tracking-tighter">RELATIONSHIP MASTER v3.0</h1>
    </nav>

    <main class="max-w-md mx-auto p-4">
        
        <section class="card border-t-4 border-indigo-500">
            <h2 class="font-bold mb-3 text-indigo-600 flex items-center gap-2">👤 我的檔案</h2>
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label>我的 MBTI</label>
                        <select id="myMbti" class="w-full"></select>
                    </div>
                    <div>
                        <label>出生年月日</label>
                        <div class="flex gap-1">
                            <select id="myY" class="w-1/2" onchange="updateDays('myY','myM','myD')"></select>
                            <select id="myM" class="w-1/4" onchange="updateDays('myY','myM','myD')"></select>
                            <select id="myD" class="w-1/4"></select>
                        </div>
                    </div>
                </div>
                <button onclick="saveMe()" class="w-full bg-indigo-600 text-white py-2 rounded-xl font-bold">儲存我的資訊</button>
            </div>
        </section>

        <section class="card">
            <h2 class="font-bold mb-4 text-slate-600">➕ 新增對象</h2>
            <div class="space-y-4">
                <input id="name" type="text" placeholder="對象姓名" class="w-full">
                <div class="grid grid-cols-2 gap-2">
                    <select id="mbti" class="w-full"></select>
                    <div class="flex gap-1">
                        <select id="year" class="w-1/2" onchange="updateDays('year','month','day')"></select>
                        <select id="month" class="w-1/4" onchange="updateDays('year','month','day')"></select>
                        <select id="day" class="w-1/4"></select>
                    </div>
                </div>
                <button onclick="saveContact()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold">開始交叉分析</button>
            </div>
        </section>

        <div id="contactList"></div>
    </main>

    <script>
        const mbtiList = ["INTJ","INTP","ENTJ","ENTP","INFJ","INFP","ENFJ","ENFP","ISTJ","ISFJ","ESTJ","ESFJ","ISTP","ISFP","ESTP","ESFP"];
        
        function initSelectors() {
            const mbtiSels = [document.getElementById('myMbti'), document.getElementById('mbti')];
            mbtiSels.forEach(s => {
                s.innerHTML = '<option value="">MBTI</option>';
                mbtiList.forEach(m => s.options.add(new Option(m, m)));
            });

            const curY = new Date().getFullYear();
            [document.getElementById('myY'), document.getElementById('year')].forEach(s => {
                for(let i = curY; i >= 1950; i--) s.options.add(new Option(i, i));
            });

            [document.getElementById('myM'), document.getElementById('month')].forEach(s => {
                for(let i = 1; i <= 12; i++) s.options.add(new Option(i, i));
            });
            
            updateDays('myY', 'myM', 'myD');
            updateDays('year', 'month', 'day');
            loadMe();
        }

        function updateDays(yId, mId, dId) {
            const y = document.getElementById(yId).value;
            const m = document.getElementById(mId).value;
            const dSel = document.getElementById(dId);
            const days = new Date(y, m, 0).getDate();
            const oldVal = dSel.value;
            dSel.innerHTML = "";
            for(let i = 1; i <= days; i++) dSel.options.add(new Option(i, i));
            if(oldVal <= days) dSel.value = oldVal;
        }

        const getZodiac = (m, d) => {
            const signs = ["摩羯", "水瓶", "雙魚", "牡羊", "金牛", "雙子", "巨蟹", "獅子", "處女", "天秤", "天蠍", "射手", "摩羯"];
            const lastDays = [19, 18, 20, 19, 20, 21, 22, 22, 22, 23, 22, 21];
            return d > lastDays[m - 1] ? signs[m] : signs[m - 1];
        };

        const getLifeNum = (y, m, d) => {
            let s = `${y}${m}${d}`.split('').reduce((a, b) => a + parseInt(b), 0);
            while (s > 9 && s !== 11 && s !== 22) s = s.toString().split('').reduce((a,b)=>a+parseInt(b),0);
            return s;
        };

        function saveMe() {
            const me = {
                mbti: document.getElementById('myMbti').value,
                y: parseInt(document.getElementById('myY').value),
                m: parseInt(document.getElementById('myM').value),
                d: parseInt(document.getElementById('myD').value),
                zodiac: getZodiac(parseInt(document.getElementById('myM').value), parseInt(document.getElementById('myD').value))
            };
            localStorage.setItem('meMaster', JSON.stringify(me));
            alert("個人資料已更新！");
            render();
        }

        function loadMe() {
            const me = JSON.parse(localStorage.getItem('meMaster') || '{}');
            if(me.mbti) {
                document.getElementById('myMbti').value = me.mbti;
                document.getElementById('myY').value = me.y;
                document.getElementById('myM').value = me.m;
                updateDays('myY', 'myM', 'myD');
                document.getElementById('myD').value = me.d;
            }
        }

        function analyze(me, target) {
            if(!me.mbti) return { status: 'yellow', html: '請先設定您的個人資訊' };
            
            let score = 50; // 基礎分
            let reports = [];

            // 1. 年齡分析
            const gap = me.y - target.y;
            let ageReport = `差距 ${Math.abs(gap)} 歲。`;
            if (Math.abs(gap) <= 3) { ageReport += "同齡層，話題容易共鳴。"; score += 10; }
            else if (gap > 10) { ageReport += "對方是長輩，需注意禮節與傳統價值。"; score -= 5; }
            else if (gap < -10) { ageReport += "對方是後輩，建議展現包容力。"; score -= 5; }
            reports.push({ title: '📅 年齡分析', content: ageReport });

            // 2. MBTI 分析
            let mbtiReport = "";
            const isTFMatch = me.mbti.includes('T') === target.mbti.includes('T');
            if(isTFMatch) { mbtiReport = "決策邏輯相似，溝通效率高。"; score += 15; }
            else { mbtiReport = "邏輯與情感對碰，容易發生誤會。"; score -= 15; }
            reports.push({ title: '🧠 MBTI 分析', content: `[${target.mbti}] ${mbtiReport}` });

            // 3. 星座分析
            const elMap = {"火":["牡羊","獅子","射手"],"地":["金牛","處女","摩羯"],"風":["雙子","天秤","水瓶"],"水":["巨蟹","天蠍","雙魚"]};
            const getEl = z => Object.keys(elMap).find(k => elMap[k].includes(z));
            const myEl = getEl(me.zodiac), taEl = getEl(target.zodiac);
            let zReport = "";
            if(myEl === taEl) { zReport = `同屬${myEl}象，性格底色一致。`; score += 10; }
            else if((myEl==='火'&&taEl==='風')||(myEl==='風'&&taEl==='火')) { zReport = "火風相遇，能激發對方的熱情。"; score += 5; }
            else if((myEl==='地'&&taEl==='水')||(myEl==='水'&&taEl==='地')) { zReport = "水地滋養，關係穩定持久。"; score += 5; }
            else { zReport = "元素差異較大，需時間磨合。"; score -= 10; }
            reports.push({ title: '✨ 星座分析', content: `${target.zodiac}座(${taEl}象)：${zReport}` });

            // 4. 靈數分析
            const taLife = getLifeNum(target.y, target.m, target.d);
            const myLife = getLifeNum(me.y, me.m, me.d);
            let lReport = `靈數 ${taLife}。`;
            if(taLife === myLife) { lReport += "靈魂頻率高度一致。"; score += 20; }
            else { lReport += "不同的生命課題，可互相學習。"; }
            reports.push({ title: '🔢 靈數分析', content: lReport });

            let status = 'yellow';
            if(score >= 70) status = 'green';
            else if(score < 40) status = 'red';

            return {
                status,
                score,
                html: reports.map(r => `<div class="analysis-item"><strong>${r.title}：</strong><br>${r.content}</div>`).join('')
            };
        }

        function saveContact() {
            const name = document.getElementById('name').value;
            const mbti = document.getElementById('mbti').value;
            const y = parseInt(document.getElementById('year').value);
            const m = parseInt(document.getElementById('month').value);
            const d = parseInt(document.getElementById('day').value);

            if(!name || !mbti) return alert("請填寫姓名與MBTI");

            const contact = { id: Date.now(), name, mbti, y, m, d, zodiac: getZodiac(m, d) };
            let list = JSON.parse(localStorage.getItem('contactsMaster') || '[]');
            list.unshift(contact);
            localStorage.setItem('contactsMaster', JSON.stringify(list));
            render();
        }

        function render() {
            const me = JSON.parse(localStorage.getItem('meMaster') || '{}');
            const list = JSON.parse(localStorage.getItem('contactsMaster') || '[]');
            const container = document.getElementById('contactList');
            
            container.innerHTML = list.map(c => {
                const res = analyze(me, c);
                const statusText = { 'green': '匹配超高 🟢', 'yellow': '正常相處 🟡', 'red': '挑戰性高 🔴' }[res.status];
                
                return `
                    <div class="card status-${res.status} animate-fade-in">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-black text-xl">${c.name}</h3>
                                <div class="mt-1">
                                    <span class="tag bg-slate-800 text-white">${statusText}</span>
                                    <span class="tag bg-indigo-100 text-indigo-700">得分: ${res.score}</span>
                                </div>
                            </div>
                            <button onclick="deleteContact(${c.id})" class="text-slate-300 hover:text-red-500">✕</button>
                        </div>
                        <div class="text-xs text-slate-600 leading-relaxed">
                            ${res.html}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function deleteContact(id) {
            let list = JSON.parse(localStorage.getItem('contactsMaster') || '[]');
            localStorage.setItem('contactsMaster', JSON.stringify(list.filter(c => c.id !== id)));
            render();
        }

        initSelectors();
    </script>
</body>
</html>
