<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關係指南針 - 專業版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { @apply bg-white p-5 rounded-2xl shadow-sm mb-4 border border-gray-100; }
        select { @apply border border-gray-200 p-2 rounded-lg bg-white focus:ring-2 focus:ring-indigo-500 outline-none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10 text-slate-800">

    <nav class="bg-white border-b p-4 sticky top-0 z-10">
        <h1 class="text-xl font-black text-indigo-600 text-center tracking-tight">RELATIONSHIP COMPASS</h1>
    </nav>

    <main class="max-w-md mx-auto p-4">
        <section class="card">
            <h2 class="font-bold mb-4 flex items-center gap-2">
                <span class="w-2 h-6 bg-indigo-500 rounded-full"></span>
                新增聯絡人
            </h2>
            <div class="space-y-4">
                <input id="name" type="text" placeholder="輸入姓名..." class="w-full border border-gray-200 p-2 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                
                <div class="grid grid-cols-2 gap-2">
                    <select id="mbti" class="w-full">
                        <option value="">選擇 MBTI</option>
                        <optgroup label="分析師">
                            <option value="INTJ">INTJ 建築師</option><option value="INTP">INTP 邏輯學家</option>
                            <option value="ENTJ">ENTJ 指揮官</option><option value="ENTP">ENTP 辯論家</option>
                        </optgroup>
                        <optgroup label="外交官">
                            <option value="INFJ">INFJ 提倡者</option><option value="INFP">INFP 調解者</option>
                            <option value="ENFJ">ENFJ 主人公</option><option value="ENFP">ENFP 競選者</option>
                        </optgroup>
                        <optgroup label="守護者">
                            <option value="ISTJ">ISTJ 物流師</option><option value="ISFJ">ISFJ 守護者</option>
                            <option value="ESTJ">ESTJ 管理者</option><option value="ESFJ">ESFJ 執政官</option>
                        </optgroup>
                        <optgroup label="探險家">
                            <option value="ISTP">ISTP 鑑賞家</option><option value="ISFP">ISFP 探險家</option>
                            <option value="ESTP">ESTP 企業家</option><option value="ESFP">ESFP 表演者</option>
                        </optgroup>
                    </select>
                    
                    <div class="flex gap-1">
                        <select id="year" onchange="updateDays()"></select>
                        <select id="month" onchange="updateDays()"></select>
                        <select id="day"></select>
                    </div>
                </div>

                <button onclick="saveContact()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-bold transition-all shadow-md active:scale-95">
                    儲存並分析性格
                </button>
            </div>
        </section>

        <div id="contactList"></div>
    </main>

    <script>
        // 初始化生日下拉選單
        const yearSel = document.getElementById('year');
        const monthSel = document.getElementById('month');
        const daySel = document.getElementById('day');

        const currentYear = new Date().getFullYear();
        for(let i = currentYear; i >= 1950; i--) yearSel.options.add(new Option(i + "年", i));
        for(let i = 1; i <= 12; i++) monthSel.options.add(new Option(i + "月", i));

        function updateDays() {
            const year = parseInt(yearSel.value);
            const month = parseInt(monthSel.value);
            const daysInMonth = new Date(year, month, 0).getDate();
            
            daySel.innerHTML = "";
            for(let i = 1; i <= daysInMonth; i++) daySel.options.add(new Option(i + "日", i));
        }
        updateDays(); // 預設初始化

        const getZodiac = (m, d) => {
            const signs = ["摩羯", "水瓶", "雙魚", "牡羊", "金牛", "雙子", "巨蟹", "獅子", "處女", "天秤", "天蠍", "射手", "摩羯"];
            const last_days = [19, 18, 20, 19, 20, 21, 22, 22, 22, 23, 22, 21];
            return d > last_days[m - 1] ? signs[m] : signs[m - 1];
        };

        const getLifePath = (y, m, d) => {
            const s = `${y}${m.toString().padStart(2,'0')}${d.toString().padStart(2,'0')}`;
            let sum = s.split('').reduce((a, b) => parseInt(a) + parseInt(b), 0);
            while (sum > 9 && sum !== 11 && sum !== 22) {
                sum = sum.toString().split('').reduce((a, b) => parseInt(a) + parseInt(b), 0);
            }
            return sum;
        };

        function getAdvice(mbti, zodiac, lifeNum) {
            let core = "";
            // 基於生日與 MBTI 的綜合邏輯
            if (lifeNum === 1 || mbti.includes('E')) core = "此人自主意識強，溝通時請直接給予重點，避免過度干涉其決定。";
            else if (lifeNum === 2 || mbti.includes('F')) core = "重視和諧與情緒價值，建議先處理心情，再處理事情。";
            else if (lifeNum === 7 || mbti.includes('T')) core = "邏輯優先，討厭無意義的社交，提供事實與數據能贏得信任。";
            else core = "性格沉穩，給予足夠的安全感與時間緩衝是相處關鍵。";

            return `【${zodiac}座x靈數${lifeNum}】${core}`;
        }

        function saveContact() {
            const name = document.getElementById('name').value;
            const mbti = document.getElementById('mbti').value;
            const y = yearSel.value, m = monthSel.value, d = daySel.value;

            if (!name || !mbti) return alert("請填寫姓名與MBTI");

            const zodiac = getZodiac(parseInt(m), parseInt(d));
            const lifeNum = getLifePath(y, m, d);
            
            const contact = {
                id: Date.now(),
                name, mbti, zodiac, lifeNum,
                bday: `${y}-${m}-${d}`,
                advice: getAdvice(mbti, zodiac, lifeNum)
            };

            let contacts = JSON.parse(localStorage.getItem('contacts') || '[]');
            contacts.unshift(contact);
            localStorage.setItem('contacts', JSON.stringify(contacts));
            render();
        }

        function render() {
            const list = document.getElementById('contactList');
            const contacts = JSON.parse(localStorage.getItem('contacts') || '[]');
            list.innerHTML = contacts.map(c => `
                <div class="card border-l-4 border-indigo-500 animate-fade-in">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="text-lg font-bold text-slate-800">${c.name} <span class="text-xs px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded-full ml-2">${c.mbti}</span></h3>
                            <p class="text-xs text-slate-400 mt-1">${c.bday} | ${c.zodiac}座 | 靈數 ${c.lifeNum}</p>
                        </div>
                        <button onclick="deleteContact(${c.id})" class="text-slate-300 hover:text-red-400 transition-colors text-xl">×</button>
                    </div>
                    <div class="mt-4 p-3 bg-slate-50 rounded-xl text-sm leading-relaxed text-slate-600 border border-slate-100">
                        ${c.advice}
                    </div>
                </div>
            `).join('');
        }

        function deleteContact(id) {
            let contacts = JSON.parse(localStorage.getItem('contacts') || '[]');
            localStorage.setItem('contacts', JSON.stringify(contacts.filter(c => c.id !== id)));
            render();
        }

        render();
    </script>
</body>
</html>
