<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關係指南針 Pro+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { @apply bg-white p-5 rounded-2xl shadow-sm mb-4 border border-gray-100; }
        select, input { @apply border border-gray-200 p-2 rounded-lg bg-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm; }
        label { @apply text-xs font-bold text-gray-500 mb-1 block; }
        .btn-primary { @apply bg-indigo-600 text-white py-2 px-4 rounded-xl font-bold shadow-md active:scale-95 transition-all; }
        .btn-save { @apply bg-orange-500 text-white py-2 px-4 rounded-xl font-bold shadow-md active:scale-95 transition-all w-full mt-3; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10 text-slate-800">

    <nav class="bg-indigo-700 text-white p-4 sticky top-0 z-20 shadow-md">
        <h1 class="text-lg font-black text-center tracking-widest">RELATIONSHIP COMPASS PRO</h1>
    </nav>

    <main class="max-w-md mx-auto p-4">
        
        <section class="card border-t-4 border-orange-400">
            <h2 class="font-bold mb-3 text-orange-600 flex items-center gap-2">👤 我的資訊設定</h2>
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label>我的 MBTI</label>
                        <select id="myMbti" class="w-full"></select>
                    </div>
                    <div>
                        <label>我的生日</label>
                        <div class="flex gap-1">
                            <select id="myY" class="w-full" onchange="updateDays('myY','myM','myD')"></select>
                            <select id="myM" class="w-full" onchange="updateDays('myY','myM','myD')"></select>
                            <select id="myD" class="w-full"></select>
                        </div>
                    </div>
                </div>
                <button onclick="saveMe()" class="btn-save">儲存我的資訊</button>
            </div>
        </section>

        <section class="card">
            <h2 class="font-bold mb-4 flex items-center gap-2 text-indigo-600">➕ 新增聯絡人</h2>
            <div class="space-y-4">
                <input id="name" type="text" placeholder="對方姓名" class="w-full">
                <div class="grid grid-cols-2 gap-2">
                    <select id="mbti" class="w-full"></select>
                    <div class="flex gap-1">
                        <select id="year" class="w-1/2" onchange="updateDays('year','month','day')"></select>
                        <select id="month" class="w-1/4" onchange="updateDays('year','month','day')"></select>
                        <select id="day" class="w-1/4"></select>
                    </div>
                </div>
                <button onclick="saveContact()" class="w-full btn-primary bg-indigo-600">分析相處建議</button>
            </div>
        </section>

        <div id="contactList"></div>
    </main>

    <script>
        const mbtiList = ["INTJ","INTP","ENTJ","ENTP","INFJ","INFP","ENFJ","ENFP","ISTJ","ISFJ","ESTJ","ESFJ","ISTP","ISFP","ESTP","ESFP"];
        
        function initSelectors() {
            const mbtiSels = [document.getElementById('myMbti'), document.getElementById('mbti')];
            mbtiSels.forEach(s => {
                s.innerHTML = '<option value="">MBTI</option>';
                mbtiList.forEach(m => s.options.add(new Option(m, m)));
            });

            const currentYear = new Date().getFullYear();
            [document.getElementById('myY'), document.getElementById('year')].forEach(s => {
                for(let i = currentYear; i >= 1950; i--) s.options.add(new Option(i + "年", i));
            });

            [document.getElementById('myM'), document.getElementById('month')].forEach(s => {
                for(let i = 1; i <= 12; i++) s.options.add(new Option(i + "月", i));
            });
            
            updateDays('myY', 'myM', 'myD');
            updateDays('year', 'month', 'day');
            loadMe();
        }

        function updateDays(yId, mId, dId) {
            const y = document.getElementById(yId).value;
            const m = document.getElementById(mId).value;
            const dSel = document.getElementById(dId);
            const days = new Date(y, m, 0).getDate();
            const currentVal = dSel.value;
            dSel.innerHTML = "";
            for(let i = 1; i <= days; i++) dSel.options.add(new Option(i + "日", i));
            if(currentVal <= days) dSel.value = currentVal;
        }

        const getZodiac = (m, d) => {
            const signs = ["摩羯", "水瓶", "雙魚", "牡羊", "金牛", "雙子", "巨蟹", "獅子", "處女", "天秤", "天蠍", "射手", "摩羯"];
            const lastDays = [19, 18, 20, 19, 20, 21, 22, 22, 22, 23, 22, 21];
            return d > lastDays[m - 1] ? signs[m] : signs[m - 1];
        };

        const getElement = (zodiac) => {
            if (["牡羊", "獅子", "射手"].includes(zodiac)) return "火";
            if (["金牛", "處女", "摩羯"].includes(zodiac)) return "地";
            if (["雙子", "天秤", "水瓶"].includes(zodiac)) return "風";
            return "水";
        };

        function saveMe() {
            const me = {
                mbti: document.getElementById('myMbti').value,
                y: parseInt(document.getElementById('myY').value),
                m: parseInt(document.getElementById('myM').value),
                d: parseInt(document.getElementById('myD').value),
                zodiac: getZodiac(parseInt(document.getElementById('myM').value), parseInt(document.getElementById('myD').value))
            };
            localStorage.setItem('me', JSON.stringify(me));
            alert("個人設定已儲存！");
            render();
        }

        function loadMe() {
            const me = JSON.parse(localStorage.getItem('me') || '{}');
            if(me.mbti) {
                document.getElementById('myMbti').value = me.mbti;
                document.getElementById('myY').value = me.y;
                document.getElementById('myM').value = me.m;
                updateDays('myY', 'myM', 'myD');
                document.getElementById('myD').value = me.d;
            }
        }

        function generateAdvice(me, target) {
            if(!me.mbti) return "⚠️ 請先儲存您的個人資訊。";
            
            let tips = [];
            
            // 1. 年齡分析
            const ageDiff = me.y - target.y; // 正數代表對方比你大
            if (ageDiff >= 10) tips.push(`👴 對方是前輩輩分，建議保持禮貌，多請益經驗。`);
            else if (ageDiff <= -10) tips.push(`👶 對方年紀較輕，建議用引導代替說教，多聊流行話題。`);
            else tips.push(`🤝 年齡相仿，可以用更平等、像朋友的方式相處。`);

            // 2. MBTI 對比
            if (me.mbti.includes('T') && !target.mbti.includes('T')) tips.push("💡 對方重感情，說話前先肯定對方的感受。");
            if (!me.mbti.includes('T') && target.mbti.includes('T')) tips.push("⚖️ 對方重邏輯，溝通時請列出 1.2.3 點事實。");

            // 3. 星座元素對比
            const myEl = getElement(me.zodiac);
            const taEl = getElement(target.zodiac);
            if (myEl === "火" && taEl === "水") tips.push("🌊 你的熱情可能給對方壓力，請放慢節奏。");
            if (myEl === "地" && taEl === "風") tips.push("🍃 對方想法跳躍，不要試圖用規矩約束他。");

            return tips.join('<br>');
        }

        function saveContact() {
            const name = document.getElementById('name').value;
            const mbti = document.getElementById('mbti').value;
            const y = parseInt(document.getElementById('year').value);
            const m = parseInt(document.getElementById('month').value);
            const d = parseInt(document.getElementById('day').value);

            if(!name || !mbti) return alert("請完整輸入");

            const contact = {
                id: Date.now(),
                name, mbti, y, m, d,
                zodiac: getZodiac(m, d)
            };

            let contacts = JSON.parse(localStorage.getItem('contacts') || '[]');
            contacts.unshift(contact);
            localStorage.setItem('contacts', JSON.stringify(contacts));
            render();
        }

        function render() {
            const me = JSON.parse(localStorage.getItem('me') || '{}');
            const list = document.getElementById('contactList');
            const contacts = JSON.parse(localStorage.getItem('contacts') || '[]');
            
            list.innerHTML = contacts.map(c => `
                <div class="card border-l-4 border-indigo-500">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h3 class="font-bold text-lg">${c.name} <span class="text-indigo-500 text-xs">[${c.mbti}]</span></h3>
                            <p class="text-[10px] text-gray-400 font-mono">${c.y}年 | ${c.zodiac}座 (${getElement(c.zodiac)}象)</p>
                        </div>
                        <button onclick="deleteContact(${c.id})" class="text-gray-300">✕</button>
                    </div>
                    <div class="bg-indigo-50 p-3 rounded-lg text-xs text-indigo-900 leading-relaxed border border-indigo-100">
                        ${generateAdvice(me, c)}
                    </div>
                </div>
            `).join('');
        }

        function deleteContact(id) {
            let contacts = JSON.parse(localStorage.getItem('contacts') || '[]');
            localStorage.setItem('contacts', JSON.stringify(contacts.filter(c => c.id !== id)));
            render();
        }

        initSelectors();
    </script>
</body>
</html>
